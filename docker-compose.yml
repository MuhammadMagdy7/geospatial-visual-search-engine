services:
  db:
    build: ./database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gvs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gvs_password_2024}
      POSTGRES_DB: ${POSTGRES_DB:-geospatial_visual_search}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gvs_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gvs_user:gvs_password_2024@db:5432/geospatial_visual_search}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      HF_HOME: /data/hf_cache
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/data/cache
      - hf_cache:/data/hf_cache
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_MAP_STYLE: ${VITE_MAP_STYLE:-https://demotiles.maplibre.org/style.json}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_cache:
  hf_cache:
